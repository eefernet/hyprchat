<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyprChat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⟩</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; overflow: hidden; }

  #root { height: 100%; width: 100%; overflow: hidden; }

  /* ── Loading Screen ── */
  #hc-loading {
    position: fixed; inset: 0; z-index: 99999;
    background: linear-gradient(135deg, #1a1e28 0%, #242933 40%, #2E3440 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    overflow: hidden;
    transition: opacity 0.9s ease;
    pointer-events: all;
  }

  #hc-loading.hc-dismiss {
    opacity: 0;
    pointer-events: none;
  }

  /* grid bg */
  #hc-loading::before {
    content: ''; position: absolute; inset: 0; opacity: .025;
    background-image: linear-gradient(#88C0D0 1px, transparent 1px), linear-gradient(90deg, #88C0D0 1px, transparent 1px);
    background-size: 64px 64px;
  }

  .hc-load-logo {
    width: 14px; height: 14px; border-radius: 50%;
    background: #88C0D0;
    box-shadow: 0 0 20px #88C0D0cc, 0 0 48px #88C0D055;
    margin-bottom: 28px;
    animation: hcGlow 2.5s ease-in-out infinite;
  }
  @keyframes hcGlow {
    0%,100% { box-shadow: 0 0 20px #88C0D0cc, 0 0 48px #88C0D055; }
    50%      { box-shadow: 0 0 32px #88C0D0ff, 0 0 72px #88C0D09a; }
  }

  .hc-load-title {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: #4C566A; margin-bottom: 36px; font-weight: 700;
  }

  .hc-load-card {
    position: relative; max-width: 520px; width: 88%;
    background: rgba(59,66,82,0.55); backdrop-filter: blur(16px);
    border: 1px solid rgba(136,192,208,0.18);
    border-radius: 18px; padding: 36px 40px;
    text-align: center;
    animation: hcSlideUp .9s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes hcSlideUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hc-load-quote {
    font-size: 15px; line-height: 1.75; color: #D8DEE9;
    font-style: italic; margin-bottom: 14px;
  }
  .hc-load-attr {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #81A1C1;
  }

  /* floating emojis */
  .hc-em {
    position: fixed; font-size: 22px; pointer-events: none; user-select: none;
    animation: hcFloat var(--hc-float-dur,4s) ease-in-out infinite var(--hc-float-del,0s);
  }
  @keyframes hcFloat {
    0%   { transform: translateY(0px)   rotate(-4deg) scale(1);    opacity: .7; }
    30%  { transform: translateY(-18px) rotate( 4deg) scale(1.06); opacity: 1; }
    60%  { transform: translateY(-8px)  rotate(-2deg) scale(.97);  opacity: .8; }
    100% { transform: translateY(0px)   rotate(-4deg) scale(1);    opacity: .7; }
  }

  /* pulsing dots */
  .hc-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #88C0D0;
    box-shadow: 0 0 8px #88C0D0aa;
    display: inline-block; margin: 0 4px;
    animation: hcPulse 1.4s ease-in-out infinite;
  }
  @keyframes hcPulse {
    0%,100% { opacity: .3; transform: scale(.7); }
    50%      { opacity: 1;  transform: scale(1.2); }
  }

  .hc-load-status {
    margin-top: 26px; font-size: 10px; color: #4C566A;
    letter-spacing: 2px; text-transform: uppercase;
    animation: hcSlideUp .9s .3s cubic-bezier(.16,1,.3,1) both;
  }
</style>
</head>

    {t:'"The heavens declare the glory of God; the skies proclaim the work of his hands."',a:'Psalm 19:1'},
    {t:'"Science without religion is lame, religion without science is blind."',a:'Albert Einstein'},
    {t:'"Two things fill the mind with ever-increasing wonder and awe — the starry heavens above me and the moral law within me."',a:'Immanuel Kant'},
    {t:'"For in him we live and move and have our being."',a:'Acts 17:28'},
    {t:'"The more I study science, the more I believe in God."',a:'Albert Einstein'},

    {t:'"Ask and it will be given to you; seek and you will find; knock and the door will be opened to you."',a:'Matthew 7:7'},
  ];
  var custom=[];
  try{custom=JSON.parse(localStorage.getItem('hc-custom-quotes')||'[]');}catch{}
  var all=defaults.concat(custom.filter(function(q){return q&&q.t;}));
  var q=all[Math.floor(Math.random()*all.length)];
  var txt=q.t;
  if(txt[0]!=='"')txt='"'+txt+'"';
  document.getElementById('hc-quote-text').textContent=txt;
  document.getElementById('hc-quote-attr').textContent=q.a?'— '+q.a:'';
})();

const TIC = {code:IC.Code,search:IC.Search,terminal:IC.Terminal,globe:IC.Globe,workflow:IC.Activity};

// Status pill - inline with chat, expressive and geeky
const Pill = ({ev,t,expanded,onToggle})=>{
  const isS = ev.type==="tool_start"||ev.type==="tool_progress"||ev.type==="thinking"||ev.type==="streaming";
  const isE = ev.type==="tool_error"||ev.type==="error";
  const isD = ev.type==="tool_end"||ev.type==="tool_done"||ev.type==="complete"||ev.type==="thought_done";
  const isThink = ev.type==="thinking"||ev.type==="thought_done";
  const bg=isE?`${t.err}18`:isD?`${t.ok}12`:isThink?`${t.f4}10`:`${t.acc}10`;
  const bc=isE?`${t.err}40`:isD?`${t.ok}28`:isThink?`${t.f4}28`:`${t.acc}28`;
  const tc=isE?t.err:isD?t.ok:isThink?t.f4:t.acc;
  let detail = null;
  if(expanded && ev.data?.detail){try{detail=JSON.parse(ev.data.detail);}catch{detail=ev.data.detail;}}
  
  const toolName = ev.data?.tool||ev.type;
  const status = ev.data?.status||"";
  
  // Geeky expressive labels + icons
  const labelMap = {
    "thinking": ["🧠", "Reasoning"],
    "thought_done": ["💡", "Reasoned"],
    "processing": isD ? ["⚡", "Initialized"] : ["🔮", "Connecting"],
    "execute_code": isD ? ["🎯", "Executed"] : ["⚡", "Sandbox"],
    "research": isD ? ["📡", "Signal Acquired"] : ["🔎", "Scanning"],
    "deep_research": isD ? ["📊", "Intel Ready"] : ["🔬", "Deep Scan"],
    "conspiracy_research": isD ? ["🕵️", "Dossier Ready"] : ["🔮", "Digging"],
    "write_file": isD ? ["💾", "Committed"] : ["📝", "Writing"],
    "read_file": isD ? ["📖", "Loaded"] : ["📂", "Reading"],
    "list_files": isD ? ["📋", "Indexed"] : ["🗂️", "Scanning"],
    "run_shell": isD ? ["⚡", "Exited"] : ["🖥️", "Shell"],
    "fetch_url": isD ? ["🌐", "Fetched"] : ["🕸️", "Spidering"],
    "install_package": isD ? ["📦", "Installed"] : ["📥", "Installing"],
    "streaming": ["✍️", "Transmitting"],
    "complete": ["✅", "Done"],
    "download_file": isD ? ["📎", "Ready"] : ["📤", "Packaging"],
    "delete_file": isD ? ["🗑️", "Deleted"] : ["🗑️", "Deleting"],
    "download_project": isD ? ["📦", "Packaged"] : ["📦", "Archiving"],
    "kb": isD ? ["📚", "Retrieved"] : ["📖", "Knowledge Base"],
    "memory": isD ? ["🧠", "Recalled"] : ["🧠", "Remembering"],
    "generate_code": isD ? ["🧬", "Code Ready"] : ["🧬", "Agent Coding"],
    "generating": ["✍️", "Generating"],
    "error": ["❌", "Error"],
    "tool_error": ["❌", "Error"],
  };
  const [icon, label] = labelMap[toolName] || (isE ? ["❌", toolName] : isD ? ["✓", toolName] : ["⏳", toolName]);
  const isActive = isS && !isD;
  const showMarquee = isThink && isActive && !expanded && status.length > 15;
  const getIconAnim = (name) => {
    if(name==="execute_code"||name==="run_shell") return "spin 1.2s linear infinite";
    if(name==="research"||name==="deep_research"||name==="fetch_url"||name==="conspiracy_research"||name==="kb") return "swing 1.5s ease-in-out infinite";
    if(name==="generate_code") return "pulse 1.5s ease-in-out infinite";
    if(name==="write_file"||name==="download_file"||name==="download_project") return "bounce 1s ease-in-out infinite";
    if(name==="memory") return "memoryPulse 1.8s ease-in-out infinite";
    if(name==="generating") return "writing 0.8s ease-in-out infinite";
    if(name==="thinking"||name==="streaming") return "bop 2s ease-in-out infinite";
    return "bop 1.5s ease-in-out infinite";
  };
  const marqueeKey = Math.floor(status.length / 30);

  return <div style={{animation:"fadeIn .3s",marginBottom:2}}>
    <div onClick={ev.data?.detail?onToggle:undefined} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"4px 12px",background:bg,border:`1px solid ${bc}`,borderRadius:expanded?"9px 9px 0 0":9,fontSize:12,color:tc,cursor:ev.data?.detail?"pointer":"default",maxWidth:"100%",transition:"all .2s",animation:isActive?`fadeIn .3s, pillGlow 2s ease-in-out infinite`:"fadeIn .3s",boxShadow:isActive?`0 0 8px ${bc}`:"none"}}>
      {isS&&!isD&&<span style={{display:"inline-block",animation:getIconAnim(toolName),flexShrink:0,lineHeight:1,transformOrigin:"center"}}>{icon}</span>}
      {isD&&<><span style={{color:t.ok,flexShrink:0,lineHeight:1}}>✓</span><span style={{flexShrink:0,lineHeight:1}}>{icon}</span></>}
      <span style={{fontWeight:600,flexShrink:0}}>{label}</span>
      {showMarquee
        ? <span className="pill-marquee-wrap">
            <span key={marqueeKey} className="pill-marquee-inner" style={{color:tc,opacity:.75,fontStyle:"italic"}}>
              {status}&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;{status}
            </span>
          </span>
        : <span style={{opacity:.6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:350,fontStyle:isThink?"italic":"normal"}}>{status}</span>
      }
      {ev.data?.detail&&<span style={{opacity:.3,flexShrink:0,fontSize:8,marginLeft:2}}>{expanded?"▴":"▾"}</span>}
    </div>
    {expanded&&detail&&<div style={{background:`${t.bgDeep}`,border:`1px solid ${bc}`,borderTop:"none",borderRadius:"0 0 8px 8px",padding:10,fontSize:11,maxHeight:250,overflowY:"auto",maxWidth:600}}>
      {typeof detail==="string"?<pre style={{margin:0,whiteSpace:"pre-wrap",color:t.dim,fontFamily:"inherit"}}>{detail}</pre>
      :detail.thinking?<div style={{color:t.dim,fontStyle:"italic",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{detail.thinking}</div>
      :detail.code?<div>
        {detail.language&&<div style={{color:t.mut,marginBottom:4,fontSize:10}}>🔧 <span style={{color:t.acc}}>{detail.language}</span></div>}
        <pre style={{margin:0,padding:8,background:`${t.surface}88`,borderRadius:4,whiteSpace:"pre-wrap",color:t.warm,fontSize:11,maxHeight:100,overflow:"auto",border:`1px solid ${t.brd}18`}}>{detail.code}</pre>
        {detail.stdout&&<><div style={{color:t.ok,marginTop:6,fontWeight:600,fontSize:10}}>📤 stdout:</div><pre style={{margin:0,padding:6,whiteSpace:"pre-wrap",color:t.dim,fontSize:11,background:`${t.ok}08`,borderRadius:4,marginTop:2}}>{detail.stdout}</pre></>}
        {detail.stderr&&<><div style={{color:t.err,marginTop:6,fontWeight:600,fontSize:10}}>⚠️ stderr:</div><pre style={{margin:0,padding:6,whiteSpace:"pre-wrap",color:t.err,fontSize:11,background:`${t.err}08`,borderRadius:4,marginTop:2}}>{detail.stderr}</pre></>}
      </div>
      :detail.results?<div>{detail.results.map((r,i)=><div key={i} style={{marginBottom:4}}><a href={r.url} target="_blank" style={{color:t.acc,textDecoration:"none",fontSize:11}}>🔗 {r.title}</a></div>)}</div>
      :detail.steps?<div style={{display:"flex",flexDirection:"column",gap:3}}>
        {detail.steps.map((s,i)=><div key={i} style={{display:"flex",gap:6,alignItems:"flex-start",padding:"3px 0",borderBottom:i<detail.steps.length-1?`1px solid ${t.brd}15`:"none"}}>
          <span style={{flexShrink:0,fontSize:11,width:18,textAlign:"center"}}>{s.icon}</span>
          <span style={{color:t.mut,fontSize:10,flexShrink:0,minWidth:16,fontWeight:600}}>#{s.step}</span>
          <span style={{color:t.acc,fontSize:10,fontWeight:600,flexShrink:0,minWidth:60}}>{s.label}</span>
          <span style={{color:t.dim,fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.detail}</span>
        </div>)}
      </div>
      :detail.method?<div>
        <div style={{color:t.mut,fontSize:10,marginBottom:4}}>⚙️ <span style={{color:t.acc}}>{detail.method}</span></div>
        {detail.args&&<pre style={{margin:0,padding:6,background:`${t.surface}66`,borderRadius:4,whiteSpace:"pre-wrap",color:t.dim,fontSize:10,maxHeight:60,overflow:"auto"}}>{JSON.stringify(detail.args,null,2)}</pre>}
        {detail.result&&<><div style={{color:t.ok,marginTop:4,fontWeight:600,fontSize:10}}>📤 Result:</div><pre style={{margin:0,padding:6,whiteSpace:"pre-wrap",color:t.dim,fontSize:10,maxHeight:80,overflow:"auto"}}>{detail.result}</pre></>}
      </div>
      :<pre style={{margin:0,whiteSpace:"pre-wrap",color:t.dim,fontSize:10}}>{JSON.stringify(detail,null,2)}</pre>}
    </div>}
  </div>;
};

// Inline tool status: shows latest pill, expands to show all
const ToolStatus = ({evts,t,expandedPill,setExpandedPill,onPreview})=>{
  const [showAll,setShowAll]=useState(false);
  if(!evts.length) return null;

  // Stable string key for expandedPill — avoids collapse when new events arrive
  // Guard: if evts only has source_links/search_results (no tool/thinking/streaming), merged will be empty
  const getPillKey = (ev) => {
    if(ev.type==="thinking"||ev.type==="thought_done") return "thinking";
    if(ev.type==="streaming"||ev.type==="complete") return "streaming";
    return ev.data?.tool || ev.type;
  };

  // Collapse events: keep only meaningful pills
  const merged = [];

  // First pass: group by category
  const thinkingEvts = evts.filter(e=>e.type==="thinking"||e.type==="thought_done");
  const toolEvts = evts.filter(e=>e.type==="tool_start"||e.type==="tool_progress"||e.type==="tool_end"||e.type==="tool_done"||e.type==="tool_error");
  const streamEvts = evts.filter(e=>e.type==="streaming"||e.type==="complete");
  const otherEvts = evts.filter(e=>!["thinking","thought_done","tool_start","tool_progress","tool_end","tool_done","tool_error","streaming","complete","code_output","file_ready","search_results","source_links"].includes(e.type));

  // Thinking: collapse to just the final state
  if(thinkingEvts.length){
    const done = thinkingEvts.find(e=>e.type==="thought_done");
    merged.push(done || thinkingEvts[thinkingEvts.length-1]);
  }

  // Tools: pair start→end by tool name, keep unpaired starts. tool_progress updates replace start status.
  const toolPairs = {};
  for(const e of toolEvts){
    const key = e.data?.tool||"unknown";
    if(!toolPairs[key]) toolPairs[key] = [];
    toolPairs[key].push(e);
  }
  for(const [key, group] of Object.entries(toolPairs)){
    const end = group.find(e=>e.type==="tool_end"||e.type==="tool_done"||e.type==="tool_error");
    if(end){merged.push(end);}else{
      // Show latest progress event if available, otherwise latest start
      const progress = [...group].reverse().find(e=>e.type==="tool_progress");
      merged.push(progress || group[group.length-1]);
    }
  }

  // Streaming: collapse to final state
  if(streamEvts.length){
    const done = streamEvts.find(e=>e.type==="complete");
    merged.push(done || streamEvts[streamEvts.length-1]);
  }

  // Other events pass through
  merged.push(...otherEvts);

  const latest = merged.length ? merged[merged.length-1] : null;
  const completedCount = merged.filter(e=>e.type==="tool_end"||e.type==="tool_done"||e.type==="complete"||e.type==="thought_done").length;
  const totalSteps = merged.length;

  const codeOutputEvts = evts.filter(e=>e.type==="code_output");
  const fileReadyEvts = evts.filter(e=>e.type==="file_ready");
  const searchResultEvts = evts.filter(e=>e.type==="search_results");
  const sourceLinkEvts = evts.filter(e=>e.type==="source_links");

  const CodeOutputCards = ()=><>{codeOutputEvts.map((e,i)=>{
    const d=e.data||{};
    return <div key={i} style={{marginTop:6,borderRadius:8,overflow:"hidden",border:`1px solid ${d.success?t.ok:t.err}33`,background:t.bgDeep,fontSize:11}}>
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",background:`${d.success?t.ok:t.err}10`,borderBottom:`1px solid ${d.success?t.ok:t.err}22`}}>
        <span>{d.success?"🎯":"❌"}</span>
        <span style={{fontWeight:600,color:d.success?t.ok:t.err}}>{d.language} output</span>
        <span style={{color:t.mut,marginLeft:"auto"}}>{d.exec_time?.toFixed?.(1)}s</span>
      </div>
      {d.stdout&&<>
        <div style={{padding:"4px 10px 2px",fontSize:10,color:t.ok,fontWeight:600}}>stdout</div>
        <pre style={{margin:0,padding:"4px 10px 8px",whiteSpace:"pre-wrap",color:t.dim,maxHeight:200,overflowY:"auto",fontSize:11}}>{d.stdout}</pre>
      </>}
      {d.stderr&&<>
        <div style={{padding:"4px 10px 2px",fontSize:10,color:t.err,fontWeight:600}}>stderr</div>
        <pre style={{margin:0,padding:"4px 10px 8px",whiteSpace:"pre-wrap",color:t.err,maxHeight:120,overflowY:"auto",fontSize:11}}>{d.stderr}</pre>
      </>}
    </div>;
  })}</>;

  const _fileIcon=(fn)=>{
    const ext=(fn||"").split(".").pop().toLowerCase();
    const m={py:"🐍",python:"🐍",js:"📜",mjs:"📜",jsx:"⚛️",ts:"🔷",tsx:"🔷",java:"☕",jar:"☕",rs:"🦀",go:"🐹",c:"⚙️",cpp:"⚙️",h:"⚙️",cs:"🟣",rb:"💎",php:"🐘",swift:"🐦",kt:"🟠",lua:"🌙",r:"📊",sh:"🖥️",bash:"🖥️",zsh:"🖥️",html:"🌐",css:"🎨",scss:"🎨",json:"📋",yaml:"📋",yml:"📋",xml:"📋",toml:"📋",md:"📝",txt:"📄",csv:"📊",sql:"🗃️",dockerfile:"🐳",png:"🖼️",jpg:"🖼️",jpeg:"🖼️",gif:"🖼️",svg:"🖼️",pdf:"📕",zip:"📦",tar:"📦",gz:"📦"};

    </div>;

  const SearchResultCards = ()=><>{searchResultEvts.map((e,ei)=>{

        })}
      </div>
      {allLinks.length>8&&<button onClick={()=>setSlExpanded(p=>!p)} style={{background:`${t.surface}60`,border:`1px solid ${t.brd}22`,color:t.mut,padding:"2px 8px",borderRadius:10,fontSize:9,cursor:"pointer",fontFamily:"inherit",marginTop:4}}>{slExpanded?`Show less ▴`:`+${allLinks.length-8} more ▾`}</button>}
    </div>;
  };


  if(!showAll){
    const activeThinking = merged.find(e=>e.type==="thinking");
    const primaryPill = activeThinking || latest;
    return <div style={{padding:"4px 0"}}>
      {primaryPill&&<div style={{display:"flex",flexDirection:"column",gap:3}}>
        <Pill ev={primaryPill} t={t} expanded={expandedPill===getPillKey(primaryPill)} onToggle={()=>setExpandedPill(expandedPill===getPillKey(primaryPill)?null:getPillKey(primaryPill))}/>
        {primaryPill!==latest&&latest&&<Pill ev={latest} t={t} expanded={expandedPill===getPillKey(latest)} onToggle={()=>setExpandedPill(expandedPill===getPillKey(latest)?null:getPillKey(latest))}/>}
        {totalSteps>1&&<button onClick={()=>setShowAll(true)} style={{background:`${t.surface}60`,border:`1px solid ${t.brd}22`,color:t.mut,padding:"2px 8px",borderRadius:10,fontSize:10,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",alignSelf:"flex-start",marginTop:1}}>
          {completedCount} step{completedCount!==1?"s":""} ▾
        </button>}
      </div>}
      <CodeOutputCards/>
      <FileReadyButtons/>
      <SearchResultCards/>
      <SourceLinkCards/>
    </div>;
  }

  return <div style={{padding:"4px 0"}}>
    <button onClick={()=>setShowAll(false)} style={{background:`${t.surface}60`,border:`1px solid ${t.brd}22`,color:t.mut,padding:"2px 8px",borderRadius:10,fontSize:10,cursor:"pointer",fontFamily:"inherit",marginBottom:4}}>
      Hide steps ▴
    </button>
    <div style={{display:"flex",flexDirection:"column",gap:2}}>
      {merged.map((ev)=><Pill key={getPillKey(ev)} ev={ev} t={t} expanded={expandedPill===getPillKey(ev)} onToggle={()=>setExpandedPill(expandedPill===getPillKey(ev)?null:getPillKey(ev))}/>)}
    </div>
    <CodeOutputCards/>
    <FileReadyButtons/>
    <SearchResultCards/>
    <SourceLinkCards/>
  </div>;
};

const Chip=({l,c,bg,onX})=><span style={{display:"inline-flex",alignItems:"center",gap:4,background:bg,color:c,padding:"3px 8px",borderRadius:20,fontSize:10,fontWeight:600}}>{l}{onX&&<span onClick={onX} style={{cursor:"pointer",opacity:.7}}>&times;</span>}</span>;

// WORKSPACE DETAIL COMPONENT
// ============================================================
function WorkspaceDetail({ws,wsLoading,t,API,workspaces,setWorkspaces,setActiveWs,setWsDetail,convs,onOpenConv,onPreview,models,wsModel,onPersonaCreated}){
  const [tab,setTab]=React.useState("convs");
  const [editMode,setEditMode]=React.useState(false);
  const [wsName,setWsName]=React.useState("");
  const [wsDesc,setWsDesc]=React.useState("");
  const [addPanel,setAddPanel]=React.useState(false);
  const [addSearch,setAddSearch]=React.useState("");
  const [analyzing,setAnalyzing]=React.useState(false);
  const [analyzeMsg,setAnalyzeMsg]=React.useState(null);
  const [creatingKb,setCreatingKb]=React.useState(false);
  React.useEffect(()=>{if(ws){setWsName(ws.name||"");setWsDesc(ws.description||"");};},[ws?.id]);
  if(wsLoading)return<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:t.mut}}><div style={{textAlign:"center"}}><div style={{fontSize:24,marginBottom:8}}>⏳</div>Loading workspace...</div></div>;
  if(!ws)return<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:t.mut}}><div style={{textAlign:"center"}}><div style={{fontSize:36,marginBottom:8}}>🗂</div>Select a workspace</div></div>;
  const font="'JetBrains Mono',monospace";
  const inputS={width:"100%",background:t.bgDeep,border:`1px solid ${t.brd}40`,color:t.text,padding:"8px 10px",borderRadius:6,fontFamily:font,fontSize:12,outline:"none",boxSizing:"border-box"};
  const btnS=(c,bg)=>({background:bg||`${c}22`,border:`1px solid ${c}44`,color:c,padding:"5px 10px",borderRadius:6,cursor:"pointer",fontFamily:font,fontSize:10,display:"flex",alignItems:"center",gap:5});
  const topics=Array.isArray(ws.topics)?ws.topics:(typeof ws.topics==="string"?JSON.parse(ws.topics||"[]"):[]);
  const convIds=(ws.conversations||[]).map(c=>c.id);
  const availableConvs=convs.filter(c=>!convIds.includes(c.id));
  const filteredAvail=availableConvs.filter(c=>(c.title||"").toLowerCase().includes(addSearch.toLowerCase()));
  const saveEdit=async()=>{
    await fetch(`${API}/api/workspaces/${ws.id}`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:wsName,description:wsDesc})}).catch(()=>{});
    setWorkspaces(p=>p.map(w=>w.id===ws.id?{...w,name:wsName,description:wsDesc}:w));
    setWsDetail(d=>({...d,name:wsName,description:wsDesc}));
    setEditMode(false);
  };
  const analyzeTopics=async()=>{
    const convTitles=(ws.conversations||[]).filter(c=>c.title&&c.title.trim());
    if(!convTitles.length){setAnalyzeMsg({ok:false,text:"No conversation titles to analyze. Add chats with titles first."});setTimeout(()=>setAnalyzeMsg(null),4000);return;}
    setAnalyzing(true);setAnalyzeMsg(null);
    const useModel=wsModel||models[0]||"llama3.2:3b";
    try{
      const r=await fetch(`${API}/api/workspaces/${ws.id}/analyze`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:useModel})});
      if(!r.ok)throw new Error(`Server error ${r.status}`);
      const d=await r.json();
      const newTopics=d.topics||[];
      setWsDetail(prev=>({...prev,topics:newTopics}));
      setWorkspaces(p=>p.map(w=>w.id===ws.id?{...w,topics:newTopics}:w));
      setAnalyzeMsg(newTopics.length?{ok:true,text:`Found ${newTopics.length} topic${newTopics.length>1?"s":""}`}:{ok:false,text:"No topics detected. Try adding more varied conversations."});
    }catch(e){setAnalyzeMsg({ok:false,text:`Analysis failed: ${e.message}. Check that model "${useModel}" is installed.`});}
    setAnalyzing(false);
    setTimeout(()=>setAnalyzeMsg(null),5000);
  };
  const createPersona=async()=>{
    setCreatingKb(true);
    try{
      const r=await fetch(`${API}/api/workspaces/${ws.id}/create-kb`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:ws.name})});
      const kb=await r.json();
      const mcR=await fetch(`${API}/api/model-configs`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:`${ws.name} Persona`,base_model:models[0]||"",system_prompt:`You are a specialized assistant with knowledge from: ${ws.name}`,tool_ids:[],kb_ids:[kb.id],parameters:{}})});
      const mc=await mcR.json();
      onPersonaCreated(mc);
    }catch{}
    setCreatingKb(false);
  };
  const addConv=async(convId)=>{
    await fetch(`${API}/api/workspaces/${ws.id}/conversations`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({conversation_id:convId})}).catch(()=>{});
    const conv=convs.find(c=>c.id===convId);
    if(conv){setWsDetail(d=>({...d,conversations:[...(d.conversations||[]),{id:conv.id,title:conv.title,model:conv.model,updated_at:conv.updated_at}]}));setWorkspaces(p=>p.map(w=>w.id===ws.id?{...w,conv_count:(w.conv_count||0)+1}:w));}
  };
  const removeConv=async(convId)=>{
    await fetch(`${API}/api/workspaces/${ws.id}/conversations/${convId}`,{method:"DELETE"}).catch(()=>{});
    setWsDetail(d=>({...d,conversations:(d.conversations||[]).filter(c=>c.id!==convId)}));
    setWorkspaces(p=>p.map(w=>w.id===ws.id?{...w,conv_count:Math.max(0,(w.conv_count||0)-1)}:w));
  };
  const deleteWs=async()=>{
    await fetch(`${API}/api/workspaces/${ws.id}`,{method:"DELETE"}).catch(()=>{});
    setWorkspaces(p=>p.filter(w=>w.id!==ws.id));
    setActiveWs(null);setWsDetail(null);
  };
  const fileIcon=(filename)=>{
    const ext=(filename||"").split(".").pop().toLowerCase();
    if(["py","js","ts","rs","go","java","c","cpp"].includes(ext))return "💻";
    if(["md","txt","pdf","docx"].includes(ext))return "📄";
    if(["csv","json","xml","yaml"].includes(ext))return "📊";
    if(["tar","gz","zip"].includes(ext))return "📦";
    return "📎";
  };
  return<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style={{padding:"14px 20px",borderBottom:`1px solid ${t.brd}22`,background:`${t.surface}44`,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:8}}>
        <span style={{fontSize:24,lineHeight:1}}>🗂</span>
        <div style={{flex:1,minWidth:0}}>
          {editMode?<input value={wsName} onChange={e=>setWsName(e.target.value)} style={{...inputS,fontSize:16,fontWeight:700,background:"transparent",border:`1px solid ${t.acc}44`,marginBottom:6}}/>
            :<div style={{fontSize:16,fontWeight:700,color:t.text,marginBottom:4}}>{ws.name}</div>}
          {editMode?<input value={wsDesc} onChange={e=>setWsDesc(e.target.value)} placeholder="Description..." style={{...inputS,fontSize:11,color:t.mut}}/>
            :<div style={{fontSize:11,color:t.mut}}>{ws.description||"No description"}</div>}
        </div>
        <div style={{display:"flex",gap:4,flexShrink:0}}>
          {editMode
            ?<><button onClick={saveEdit} style={btnS(t.ok)}>💾 Save</button><button onClick={()=>setEditMode(false)} style={btnS(t.mut)}>Cancel</button></>
            :<><button onClick={()=>setEditMode(true)} style={btnS(t.mut)}>✏️ Edit</button>
              <button onClick={analyzeTopics} disabled={analyzing} style={btnS(t.acc)}>{analyzing?"⏳":"🔬"} Analyze</button>
              <button onClick={createPersona} disabled={creatingKb} style={btnS(t.pink)}>{creatingKb?"⏳":"✦"} Create Persona</button>
              <button onClick={deleteWs} style={btnS(t.err)}>🗑</button></>}
        </div>
      </div>
      {analyzeMsg&&<div style={{fontSize:10,color:analyzeMsg.ok?t.ok:t.err,marginTop:4,padding:"4px 8px",background:analyzeMsg.ok?`${t.ok}15`:`${t.err}15`,borderRadius:6,border:`1px solid ${analyzeMsg.ok?t.ok:t.err}33`}}>{analyzeMsg.text}</div>}
      {topics.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:analyzeMsg?4:0}}>
        {topics.map((tp,i)=><span key={i} style={{fontSize:10,padding:"3px 8px",borderRadius:12,background:tp.color+"22",color:tp.color,border:`1px solid ${tp.color}44`,fontWeight:600}}>{tp.label}</span>)}
      </div>}
    </div>
    <div style={{display:"flex",gap:0,borderBottom:`1px solid ${t.brd}22`,flexShrink:0}}>
      {[["convs","💬 Conversations"],["files","📎 Files"]].map(([id,label])=><button key={id} onClick={()=>{setTab(id);setAddPanel(false);}} style={{padding:"10px 16px",background:tab===id?`${t.acc}15`:"transparent",border:"none",borderBottom:tab===id?`2px solid ${t.acc}`:"2px solid transparent",color:tab===id?t.acc:t.mut,cursor:"pointer",fontFamily:font,fontSize:11,fontWeight:tab===id?700:400}}>{label}</button>)}
      <button onClick={()=>setAddPanel(p=>!p)} style={{marginLeft:"auto",padding:"10px 14px",background:addPanel?`${t.warm}15`:"transparent",border:"none",borderBottom:addPanel?`2px solid ${t.warm}`:"2px solid transparent",color:addPanel?t.warm:t.mut,cursor:"pointer",fontFamily:font,fontSize:11}}>+ Add Chats</button>
    </div>
    {addPanel&&<div style={{padding:12,borderBottom:`1px solid ${t.brd}22`,background:`${t.warm}07`,animation:"fadeIn .2s",flexShrink:0}}>
      <input value={addSearch} onChange={e=>setAddSearch(e.target.value)} placeholder="Search conversations..." style={{...inputS,marginBottom:8}}/>
      <div style={{maxHeight:180,overflowY:"auto",display:"flex",flexDirection:"column",gap:3}}>
        {filteredAvail.length===0&&<div style={{fontSize:11,color:t.mut,padding:8,textAlign:"center"}}>All conversations are already in this workspace.</div>}
        {filteredAvail.map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:`${t.surface}44`,borderRadius:8,cursor:"pointer",border:`1px solid ${t.brd}22`}} onClick={()=>addConv(c.id)}>
          <span style={{fontSize:12,flex:1,color:t.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.title||"New Chat"}</span>
          <span style={{fontSize:10,color:t.mut}}>{c.model||""}</span>
          <span style={{color:t.ok,fontSize:10}}>+ Add</span>
        </div>)}
      </div>
    </div>}
    <div style={{flex:1,overflowY:"auto",padding:20}}>
      {tab==="convs"&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
        {!(ws.conversations||[]).length&&<div style={{textAlign:"center",padding:40,color:t.mut,fontSize:12}}>No conversations yet.<br/>Click "+ Add Chats" to add some.</div>}
        {(ws.conversations||[]).map(c=><div key={c.id} style={{padding:"10px 14px",borderRadius:10,background:`${t.surface}66`,border:`1px solid ${t.brd}33`,display:"flex",alignItems:"center",gap:10,animation:"fadeIn .3s"}}>
          <span style={{fontSize:18}}>💬</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:t.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.title||"New Chat"}</div>
            <div style={{fontSize:10,color:t.mut,marginTop:2}}>{c.model||""} {c.updated_at?new Date(c.updated_at).toLocaleDateString():""}</div>
          </div>
          <button onClick={()=>onOpenConv(c.id)} style={btnS(t.acc)}>Open →</button>
          <button onClick={()=>removeConv(c.id)} style={btnS(t.err)}>✕</button>
        </div>)}
      </div>}
      {tab==="files"&&<div style={{display:"flex",flexWrap:"wrap",gap:10}}>
        {!(ws.files||[]).length&&<div style={{width:"100%",textAlign:"center",padding:40,color:t.mut,fontSize:12}}>No files yet.<br/>Files are tracked automatically when the AI downloads them in workspace chats.</div>}
        {(ws.files||[]).map((f,i)=><div key={i} style={{width:180,padding:"12px 14px",borderRadius:10,background:`${t.surface}66`,border:`1px solid ${t.brd}33`,animation:"fadeIn .3s",display:"flex",flexDirection:"column",gap:6}}>
          <span style={{fontSize:28,lineHeight:1}}>{fileIcon(f.filename)}</span>
          <div style={{fontSize:11,fontWeight:600,color:t.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.filename}</div>
          <div style={{fontSize:10,color:t.mut,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.conversation_title||"Unknown chat"}</div>
          <div style={{display:"flex",gap:4,marginTop:"auto"}}>
            {onPreview&&<button onClick={()=>onPreview(f.filename,f.url)} style={{...btnS(t.acc),flex:1,justifyContent:"center"}}>👁</button>}
            <a href={`${API}${f.url}`} download={f.filename} style={{...btnS(t.ok),flex:1,justifyContent:"center",textDecoration:"none"}}>⬇</a>
          </div>
        </div>)}
      </div>}
    </div>
  </div>;
}

function SandboxSection({t,btnS,labelS}){
  const [sbInfo,setSbInfo]=useState(null);
  const [cleanupDays,setCleanupDays]=useState(30);
  const [cleaning,setCleaning]=useState(false);
  const [cleanResult,setCleanResult]=useState(null);
  const [cbCleaning,setCbCleaning]=useState(false);
  const [cbResult,setCbResult]=useState(null);
  const fmtBytes=(b)=>{if(!b)return"0 B";if(b<1024)return`${b} B`;if(b<1048576)return`${(b/1024).toFixed(1)} KB`;return`${(b/1048576).toFixed(1)} MB`;};
  useEffect(()=>{
    fetch(`${API}/api/settings`).then(r=>r.json()).then(d=>{setSbInfo(d);setCleanupDays(d.file_cleanup_days??30);}).catch(()=>{});
  },[]);
  const saveCleanupDays=async(v)=>{
    setCleanupDays(v);
    await fetch(`${API}/api/settings`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({file_cleanup_days:v})}).catch(()=>{});
  };
  const cleanNow=async()=>{
    setCleaning(true);setCleanResult(null);
    try{const r=await fetch(`${API}/api/settings/cleanup-now`,{method:"POST"});const d=await r.json();setCleanResult(d);
      const r2=await fetch(`${API}/api/settings`);const d2=await r2.json();setSbInfo(d2);
    }catch{setCleanResult({error:"Failed"});}
    setCleaning(false);
  };
  const cleanCodebox=async()=>{
    setCbCleaning(true);setCbResult(null);
    try{const r=await fetch(`${API}/api/settings/cleanup-codebox`,{method:"POST"});const d=await r.json();setCbResult(d);
    }catch{setCbResult({error:"Failed"});}
    setCbCleaning(false);
  };
  const INTERVALS=[
    {label:"Every week",days:7},{label:"Every 2 weeks",days:14},
    {label:"Monthly (default)",days:30},{label:"Every 3 months",days:90},
    {label:"Every 6 months",days:180},{label:"Yearly",days:365},
    {label:"Never",days:0},
  ];
  return <div style={{marginBottom:20}}>
    <label style={labelS}>Sandbox & File Cleanup</label>
    <div style={{background:`${t.surface}66`,border:`1px solid ${t.brd}22`,borderRadius:10,padding:"10px 14px",marginBottom:10,fontSize:11}}>
      <div style={{display:"flex",flexWrap:"wrap",gap:"6px 20px",marginBottom:sbInfo?.sandbox_dir?6:0}}>
        {sbInfo?.sandbox_dir&&<div style={{color:t.mut}}>
          <span style={{color:t.acc}}>📁 </span>
          <span style={{fontFamily:"monospace",fontSize:10,color:t.dim,wordBreak:"break-all"}}>{sbInfo.sandbox_dir}</span>
        </div>}
      </div>
      <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
        <div><span style={{color:t.mut}}>Files: </span><span style={{fontWeight:700,color:t.text}}>{sbInfo?.sandbox_file_count??"—"}</span></div>
        <div><span style={{color:t.mut}}>Size: </span><span style={{fontWeight:700,color:t.text}}>{sbInfo!=null?fmtBytes(sbInfo.sandbox_size_bytes):"—"}</span></div>
        <div><span style={{color:t.mut}}>Venv: </span><span style={{fontWeight:700,color:sbInfo?.sandbox_venv_ready?t.ok:t.mut}}>{sbInfo?.sandbox_venv_ready?"✓ Ready":"building..."}</span></div>
      </div>
    </div>
    <div style={{marginBottom:8}}>
      <div style={{fontSize:10,color:t.mut,marginBottom:5}}>Auto-delete tool output files after:</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {INTERVALS.map(iv=><button key={iv.days} onClick={()=>saveCleanupDays(iv.days)}
          style={{...btnS(cleanupDays===iv.days?t.acc:t.mut),background:cleanupDays===iv.days?`${t.acc}22`:`${t.surface}55`,fontWeight:cleanupDays===iv.days?700:400,fontSize:10}}>
          {iv.label}
        </button>)}
      </div>
      {cleanupDays===0&&<div style={{fontSize:10,color:t.warm,marginTop:4}}>⚠ Files will never be cleaned automatically. Clean manually when needed.</div>}
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <button onClick={cleanNow} disabled={cleaning} style={{...btnS(t.err),opacity:cleaning?.6:1}}>
        {cleaning?<><span style={{display:"inline-block",animation:"spin .8s linear infinite"}}>⟳</span> Cleaning...</>:"🗑 Clean Sandbox"}
      </button>
      <button onClick={cleanCodebox} disabled={cbCleaning} style={{...btnS(t.warm||"#e89b3e"),opacity:cbCleaning?.6:1}}>
        {cbCleaning?<><span style={{display:"inline-block",animation:"spin .8s linear infinite"}}>⟳</span> Cleaning...</>:"🗑 Clean Codebox"}
      </button>
      {cleanResult&&!cleanResult.error&&<span style={{fontSize:11,color:t.ok}}>
        ✓ Sandbox: {cleanResult.deleted} file{cleanResult.deleted!==1?"s":""}{cleanResult.freed_bytes>0?`, freed ${fmtBytes(cleanResult.freed_bytes)}`:""}
      </span>}
      {cbResult&&!cbResult.error&&<span style={{fontSize:11,color:t.ok}}>
        ✓ Codebox: {cbResult.deleted} item{cbResult.deleted!==1?"s":""}{cbResult.freed_bytes>0?`, freed ${fmtBytes(cbResult.freed_bytes)}`:""}
      </span>}
      {cleanResult?.skipped&&<span style={{fontSize:11,color:t.mut}}>↷ {cleanResult.skipped}</span>}
      {cleanResult?.error&&<span style={{fontSize:11,color:t.err}}>✕ {cleanResult.error}</span>}
      {cbResult?.error&&<span style={{fontSize:11,color:t.err}}>✕ Codebox: {cbResult.error}</span>}
    </div>
    <div style={{fontSize:10,color:t.mut,marginTop:6,lineHeight:1.5}}>
      Tool-generated files (code outputs, downloads) are stored in <code style={{background:`${t.surface}`,padding:"1px 5px",borderRadius:3,fontSize:9}}>{sbInfo?.sandbox_outputs_dir||"sandbox/outputs/"}</code> and cleaned automatically. User uploads and knowledge base files are never auto-deleted.
    </div>
  </div>;
}

// ModelPicker — custom dropdown replacing plain <select> for model selection
function ModelPicker({value,onChange,models,modelDetails,t,font,style={},compact=false}){
  const [open,setOpen]=useState(false);
  const [dropPos,setDropPos]=useState({top:0,left:0,width:220});
  const triggerRef=useRef(null);
  const dropRef=useRef(null);
  useEffect(()=>{
    if(!open)return;
    const handler=(e)=>{
      if(triggerRef.current&&triggerRef.current.contains(e.target))return;
      if(dropRef.current&&dropRef.current.contains(e.target))return;
      setOpen(false);
    };
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[open]);
  const openDropdown=()=>{
    if(triggerRef.current){
      const r=triggerRef.current.getBoundingClientRect();
      setDropPos({top:r.bottom+4,left:r.left,width:Math.max(r.width,240)});
    }
    setOpen(p=>!p);
  };
  const famIcon=(n)=>{const b=(n||"").toLowerCase();if(b.includes("qwen"))return"🌸";if(b.includes("llama"))return"🦙";if(b.includes("mistral")||b.includes("mixtral"))return"💨";if(b.includes("gemma"))return"💎";if(b.includes("phi"))return"φ";if(b.includes("deepseek"))return"🔍";if(b.includes("coder")||b.includes("codestral"))return"💻";if(b.includes("wizard"))return"🧙";if(b.includes("hf.co"))return"🤗";return"🤖";};
  const szCol=(tag)=>{const l=(tag||"").toLowerCase();if(l.match(/70b|65b|72b/))return t.err;if(l.match(/30b|32b|34b/))return t.warm;if(l.match(/13b|14b|27b/))return t.acc;if(l.match(/7b|8b/))return t.ok;if(l.match(/1b|3b|4b/))return t.f1;return t.mut;};

                  };

                  {(()=>{if(isU||msg.isS||!msg.metadata?.saved_events?.length)return null;const msgs=act.messages||[];const lastAI=msgs.map((m,idx)=>({m,idx})).filter(x=>x.m.role==="assistant").pop()?.idx;const isLast=i===lastAI;if(isLast&&evts.length>0)return null;return <ToolStatus evts={msg.metadata.saved_events} t={t} expandedPill={expandedPill} setExpandedPill={setExpandedPill} onPreview={openPreview}/>;})()}
                  {!msg.isS&&!isEditing&&<div style={{display:"flex",gap:3,marginTop:3}}>
                    {!isU&&msg.content&&<button onClick={()=>cp(msg.content,mid)} style={{background:"none",border:`1px solid ${t.brd}18`,color:copied===mid?t.ok:t.mut,cursor:"pointer",padding:"2px 6px",borderRadius:4,fontFamily:font,fontSize:9,display:"flex",alignItems:"center",gap:3}}>
                      {copied===mid?<><IC.Check/> copied</>:<><IC.Copy/> copy</>}
                    </button>}
                    {!isU&&msg.content&&!streaming&&<button onClick={()=>regenerate(i)} style={{background:"none",border:`1px solid ${t.brd}18`,color:t.mut,cursor:"pointer",padding:"2px 6px",borderRadius:4,fontFamily:font,fontSize:9,display:"flex",alignItems:"center",gap:3}}>
                      <IC.Refresh/> regenerate
                    </button>}
                    {isU&&!streaming&&<button onClick={()=>setEditingMsg({index:i,content:msg.content})} style={{background:"none",border:`1px solid ${t.brd}18`,color:t.mut,cursor:"pointer",padding:"2px 6px",borderRadius:4,fontFamily:font,fontSize:9,display:"flex",alignItems:"center",gap:3}}>
                      <IC.Pencil/> edit
                    </button>}
                  </div>}
                </div>
              </div>;
            })}
            {evts.length>0&&!(act.messages||[]).some(m=>m.role==="assistant")&&<div style={{maxWidth:chatWidth,margin:"0 auto",padding:"8px 16px"}}><ToolStatus evts={evts} t={t} expandedPill={expandedPill} setExpandedPill={setExpandedPill} onPreview={openPreview}/></div>}
            <div ref={chatEnd}/>
          </div>}
        </div>
          {/* Preview panel */}
          {previewFile&&<div style={{width:previewWidth,flexShrink:0,borderLeft:`1px solid ${t.brd}33`,background:t.bgDeep,display:"flex",flexDirection:"column",position:"relative",overflow:"hidden",transition:"width .15s"}}>
            {/* Drag handle */}
            <div onMouseDown={startPreviewDrag} style={{position:"absolute",left:0,top:0,bottom:0,width:5,cursor:"col-resize",zIndex:10,background:"transparent"}} onMouseEnter={e=>e.currentTarget.style.background=`${t.acc}44`} onMouseLeave={e=>e.currentTarget.style.background="transparent"}/>
            {/* Header */}
            <div style={{padding:"9px 12px",borderBottom:`1px solid ${t.brd}22`,display:"flex",alignItems:"center",gap:7,flexShrink:0,background:`${t.surface}88`}}>
              <span style={{fontSize:11,fontWeight:700,color:t.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{previewFile.isExternal?(()=>{try{return new URL(previewFile.url).hostname.replace("www.","");}catch{return previewFile.filename;}})():previewFile.filename}</span>
              <span style={{fontSize:9,color:previewFile.isExternal?t.warm:t.mut,background:`${t.surface}`,padding:"2px 6px",borderRadius:4,flexShrink:0}}>{previewFile.isExternal?"web":`.${previewFile.type}`}</span>
              {previewFile.isExternal
                ?<a href={previewFile.url} target="_blank" rel="noopener" style={{color:t.acc,fontSize:10,textDecoration:"none",padding:"2px 6px",border:`1px solid ${t.acc}44`,borderRadius:4,flexShrink:0}}>↗ open</a>
                :<a href={`${API}${previewFile.url}`} download={previewFile.filename} style={{color:t.ok,fontSize:10,textDecoration:"none",padding:"2px 6px",border:`1px solid ${t.ok}44`,borderRadius:4,flexShrink:0}}>⬇</a>}
              <button onClick={closePreview} style={{background:"none",border:"none",color:t.mut,cursor:"pointer",fontSize:16,padding:"0 2px",flexShrink:0,lineHeight:1}}>✕</button>
            </div>
            {/* Content */}
            <div style={{flex:1,overflowY:"auto",padding:14}}>
              {previewError?<div style={{display:"flex",flexDirection:"column",gap:10,padding:16,background:`${t.err}10`,border:`1px solid ${t.err}33`,borderRadius:10,color:t.err}}>
                <div style={{fontWeight:700,fontSize:12}}>⚠ {previewError}</div>
                {previewFile.isExternal
                  ?<a href={previewFile.url} target="_blank" rel="noopener" style={{color:t.acc,fontSize:11,textDecoration:"none",padding:"5px 10px",border:`1px solid ${t.acc}44`,borderRadius:6,display:"inline-flex",alignItems:"center",gap:4}}>↗ Open in new tab</a>
                  :<a href={`${API}${previewFile.url}`} download={previewFile.filename} style={{color:t.ok,fontSize:11,textDecoration:"none",padding:"5px 10px",border:`1px solid ${t.ok}44`,borderRadius:6,display:"inline-flex",alignItems:"center",gap:4}}>⬇ Download anyway</a>}
              </div>
              :previewFile.isExternal&&previewFile.type==="pdf"
                ?<iframe src={`${API}/api/proxy-preview?url=${encodeURIComponent(previewFile.url)}`} style={{width:"100%",height:"100%",border:"none",borderRadius:6,minHeight:500}} title={previewFile.filename}/>
              :previewFile.isExternal&&["png","jpg","jpeg","gif","webp","svg"].includes(previewFile.type)
                ?<img src={`${API}/api/proxy-preview?url=${encodeURIComponent(previewFile.url)}`} style={{maxWidth:"100%",borderRadius:6,display:"block"}} alt={previewFile.filename}/>
              :["png","jpg","jpeg","gif","webp","svg"].includes(previewFile.type)&&!previewFile.isExternal
                ?<img src={`${API}${previewFile.url}`} style={{maxWidth:"100%",borderRadius:6,display:"block"}} alt={previewFile.filename}/>
                :previewFile.type==="html"&&previewContent
                ?<iframe sandbox="allow-scripts allow-same-origin" srcDoc={previewContent} style={{width:"100%",height:"100%",border:"none",borderRadius:6,background:"#fff",minHeight:400}} title={previewFile.filename}/>
                :previewFile.type==="md"&&previewContent
                ?<div style={{lineHeight:1.7,fontSize:12,color:t.dim}}>{(() => {
                    if(!previewContent)return null;
                    let text=previewContent;
                    text=text.replace(/(?<!\]\()\/api\/downloads\/([^\s)"'`\]]+)/g,'[📎 $1](/api/downloads/$1)');
                    return text.split(/(```[\s\S]*?```)/g).map((p,i)=>{
                      if(p.startsWith("```")){const m=p.match(/```(\w*)\n?([\s\S]*?)```/);const code=m?.[2]||p.slice(3,-3);return <pre key={i} style={{margin:"8px 0",padding:10,background:`${t.surface}88`,borderRadius:6,overflowX:"auto",fontSize:11,color:t.warm,border:`1px solid ${t.brd}33`}}>{code}</pre>;}
                      return <span key={i} style={{whiteSpace:"pre-wrap"}}>{p.split("\n").map((ln,j)=>{
                        if(ln.match(/^### /))return<div key={j} style={{fontSize:13,fontWeight:700,color:t.acc,margin:"10px 0 4px"}}>{ln.slice(4)}</div>;
                        if(ln.match(/^## /))return<div key={j} style={{fontSize:14,fontWeight:700,color:t.acc,margin:"12px 0 5px"}}>{ln.slice(3)}</div>;
                        if(ln.match(/^# /))return<div key={j} style={{fontSize:16,fontWeight:700,color:t.acc,margin:"14px 0 6px"}}>{ln.slice(2)}</div>;
                        return<div key={j} style={{minHeight:ln===""?8:"auto"}}>{ln}</div>;
                      })}</span>;
                    });
                  })()}</div>
                :previewContent
                ?<pre style={{margin:0,whiteSpace:"pre-wrap",fontSize:11,color:t.dim,fontFamily:font,lineHeight:1.6}}>{previewContent}</pre>
                :!["png","jpg","jpeg","gif","webp","svg"].includes(previewFile.type)
                ?<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:200,color:t.mut,fontSize:12,gap:6}}><span style={{fontSize:32}}>⏳</span>Loading...</div>
                :null
              }
            </div>
          </div>}
        </div>
        {/* TOOL TOGGLES BAR + QUICK SEARCH */}
        <div style={{padding:"0 16px",flexShrink:0}}>
          <div style={{maxWidth:chatWidth,margin:"0 auto",display:"flex",gap:4,overflowX:"auto",padding:"4px 0",alignItems:"center"}}>
            {!act?.is_council&&allTools.map(tl=>{
              const on=(act?.tool_ids||[]).includes(tl.id);
              const isQs=tl.id==="quick_search";
              const col=isQs?t.f1:t.warm;
              return <button key={tl.id} onClick={()=>{
                if(!actId)return;
                uConv(actId,c=>{const ids=c.tool_ids||[];return{...c,tool_ids:on?ids.filter(x=>x!==tl.id):[...ids,tl.id]};});
              }} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:12,fontSize:10,fontWeight:on?600:400,cursor:"pointer",whiteSpace:"nowrap",background:on?`${col}18`:`${t.surface}44`,border:`1px solid ${on?col:t.brd}33`,color:on?col:t.mut,transition:"all .15s",boxShadow:on?`0 0 6px ${col}22`:"none"}}>
                {isQs&&searchLoading?<span style={{display:"inline-block",animation:"spin .8s linear infinite"}}>⟳</span>:(on?<IC.ToggleOn/>:<IC.ToggleOff/>)}{tl.name}
              </button>;
            })}
          </div>
        </div>
        {/* INPUT */}
        <div style={{padding:"6px 18px 14px",flexShrink:0}}>
          {/* Attachment chips */}
          {/* Council suggested prompts */}
          {act?.is_council&&!councilRunning&&(councilSuggestions.length>0||councilSugLoading)&&<div style={{maxWidth:chatWidth,margin:"0 auto",padding:"0 0 6px",display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              {councilSugLoading?<div style={{display:"flex",alignItems:"center",gap:5,padding:"4px 0",width:"100%"}}>
                <div style={{display:"flex",gap:3}}>{[0,1,2].map(i=><div key={i} style={{width:4,height:4,borderRadius:"50%",background:t.pink,animation:`pulse 1.4s ${i*.16}s infinite`}}/>)}</div>
                <span style={{fontSize:10,color:t.mut}}>Generating suggestions...</span>
              </div>:councilSuggestions.map((s,i)=><button key={i} onClick={()=>{setInp(s);setCouncilSuggestions([]);setTimeout(()=>inpRef.current?.focus(),50);}}
                style={{background:`${t.pink}08`,border:`1px solid ${t.pink}25`,borderRadius:20,padding:"5px 12px",fontSize:11,color:t.dim,cursor:"pointer",fontFamily:font,transition:"all .15s",maxWidth:"100%",textAlign:"left",lineHeight:1.4}}
                onMouseOver={e=>{e.currentTarget.style.background=`${t.pink}18`;e.currentTarget.style.borderColor=`${t.pink}44`;e.currentTarget.style.color=t.text;}}
                onMouseOut={e=>{e.currentTarget.style.background=`${t.pink}08`;e.currentTarget.style.borderColor=`${t.pink}25`;e.currentTarget.style.color=t.dim;}}>
                {s}
              </button>)}
              {!councilSugLoading&&<button onClick={()=>fetchCouncilSuggestions(act?.council_config_id)} title="Regenerate suggestions" style={{background:"none",border:`1px solid ${t.brd}33`,borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:t.mut,fontSize:11,flexShrink:0}}>↻</button>}
            </div>}
          {attachments.length>0&&<div style={{maxWidth:chatWidth,margin:"0 auto",display:"flex",flexWrap:"wrap",gap:4,padding:"4px 0"}}>
            {attachments.map((a,i)=><Chip key={i} l={`📎 ${a.name}`} c={t.f1} bg={`${t.f1}15`} onX={()=>setAttachments(p=>p.filter((_,j)=>j!==i))}/>)}
          </div>}
          <div style={{maxWidth:chatWidth,margin:"0 auto",...glass,borderRadius:16,padding:"6px 6px 6px 14px",display:"flex",alignItems:"center",gap:6,border:`1px solid ${councilRunning?t.pink:streaming?t.warm:quickSearch?t.f1:t.acc}38`,boxShadow:`0 0 ${councilRunning||streaming?32:16}px ${councilRunning?t.pink:streaming?t.warm:t.acc}${councilRunning||streaming?"22":"0C"}`,transition:"box-shadow .4s,border-color .4s",minHeight:48}}>
            {!act?.is_council&&<><button onClick={()=>fileRef.current?.click()} title="Attach file" style={{background:"none",border:"none",color:t.mut,cursor:"pointer",padding:"4px 3px",display:"flex",alignItems:"center",flexShrink:0,opacity:.6}}>
              <IC.Paperclip/>
            </button>
            <input ref={fileRef} type="file" multiple style={{display:"none"}} onChange={e=>{if(e.target.files?.length)handleFileUpload(Array.from(e.target.files));e.target.value="";}}/>
            {prompts.length>0&&<div style={{position:"relative"}}>
              <button onClick={()=>{setShowPromptPicker(p=>!p);setPromptSearch("");}} title="Prompt Library (⚡)" style={{background:showPromptPicker?`${t.f1}15`:"none",border:"none",color:showPromptPicker?t.f1:t.mut,cursor:"pointer",padding:"4px 5px",display:"flex",alignItems:"center",flexShrink:0,fontSize:13,opacity:showPromptPicker?1:.7}}>⚡</button>
              {showPromptPicker&&<div style={{position:"absolute",bottom:"110%",left:0,zIndex:50,background:t.bgDeep,border:`1px solid ${t.brd}44`,borderRadius:12,boxShadow:`0 4px 24px #0008`,minWidth:280,maxWidth:360,padding:8}}>
                <input value={promptSearch} onChange={e=>setPromptSearch(e.target.value)} placeholder="Search prompts..." style={{...inputS,marginBottom:6,padding:"5px 8px",fontSize:11}} autoFocus/>
                <div style={{maxHeight:220,overflowY:"auto",display:"flex",flexDirection:"column",gap:2}}>
                  {prompts.filter(p=>!promptSearch||p.title.toLowerCase().includes(promptSearch.toLowerCase())||p.content.toLowerCase().includes(promptSearch.toLowerCase())).map(p=><div key={p.id} onClick={()=>{setInp(p.content);setShowPromptPicker(false);setTimeout(()=>inpRef.current?.focus(),50);}} style={{padding:"7px 10px",borderRadius:8,cursor:"pointer",background:`${t.surface}66`,border:`1px solid ${t.brd}22`,transition:"background .12s"}} onMouseEnter={e=>e.currentTarget.style.background=`${t.f1}15`} onMouseLeave={e=>e.currentTarget.style.background=`${t.surface}66`}>
                    <div style={{fontSize:11,fontWeight:600,color:t.text}}>{p.title}</div>
                    <div style={{fontSize:9,color:t.f1,marginTop:1}}>{p.category||"General"}</div>
                  </div>)}
                  {prompts.filter(p=>!promptSearch||p.title.toLowerCase().includes(promptSearch.toLowerCase())).length===0&&<div style={{textAlign:"center",padding:16,color:t.mut,fontSize:11}}>No matches</div>}
                </div>
                <div style={{borderTop:`1px solid ${t.brd}22`,marginTop:4,paddingTop:4}}>
                  <button onClick={()=>{setShowPromptPicker(false);setPanel("prompts");}} style={{...btnS(t.f1),width:"100%",justifyContent:"center",fontSize:9}}>Manage Prompts →</button>
                </div>
              </div>}
            </div>}
            </>}
            <textarea ref={inpRef} value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
              placeholder={`${act?.is_council&&councilRunning?"⚖️ Council is deliberating...":act?.is_council?"Bring forth your query, the council awaits...":"What's on your mind?"}`} rows={1}
              disabled={streaming||councilRunning}
              style={{flex:1,background:"transparent",border:"none",color:t.text,fontFamily:font,fontSize:14,outline:"none",resize:"none",padding:"8px 0",maxHeight:140,lineHeight:1.6}}
              onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";}}
              onPaste={e=>{const files=Array.from(e.clipboardData?.files||[]);if(files.length){e.preventDefault();handleFileUpload(files);}}}/>
            {councilRunning?<button onClick={()=>setCouncilRunning(false)} style={{background:t.pink,border:"none",color:"#fff",padding:"10px 14px",borderRadius:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,animation:"pCouncilGlow 1.5s ease-in-out infinite"}}><IC.Stop/></button>
            :streaming?<button onClick={stop} style={{background:t.err,border:"none",color:"#fff",padding:"10px 14px",borderRadius:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,animation:"pGlow 1.5s ease-in-out infinite"}}><IC.Stop/></button>
            :<button onClick={send} disabled={!inp.trim()&&!attachments.length} style={{background:(inp.trim()||attachments.length)?(act?.is_council?t.pink:t.acc):t.sfBri,border:"none",color:(inp.trim()||attachments.length)?t.bgDeep:t.mut,padding:"10px 14px",borderRadius:12,cursor:(inp.trim()||attachments.length)?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .2s",boxShadow:(inp.trim()||attachments.length)?`0 0 12px ${t.acc}44`:"none"}}>{act?.is_council?<IC.Council/>:<IC.Send/>}</button>}
          </div>
        </div>
      </>}
    </div>

    {/* Close prompt picker on outside click */}
    {showPromptPicker&&<div onClick={()=>setShowPromptPicker(false)} style={{position:"fixed",inset:0,zIndex:49}}/>}

    {/* Changelog Modal */}
    {showChangelog&&<div style={{position:"fixed",inset:0,zIndex:100,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(6px)"}} onClick={e=>{if(e.target===e.currentTarget)setShowChangelog(false);}}>
      <div style={{background:t.bgDeep,border:`1px solid ${t.brd}44`,borderRadius:16,width:"min(720px,95vw)",maxHeight:"85vh",display:"flex",flexDirection:"column",boxShadow:`0 8px 48px #0008`,overflow:"hidden",animation:"fadeIn .25s"}}>
        <div style={{padding:"14px 20px",borderBottom:`1px solid ${t.brd}22`,display:"flex",alignItems:"center",gap:8,flexShrink:0,background:`${t.surface}88`}}>
          <span style={{fontSize:18}}>📋</span>
          <span style={{fontSize:14,fontWeight:700,color:t.acc,flex:1}}>HyprChat Changelog</span>
          <button onClick={()=>setShowChangelog(false)} style={{background:"none",border:"none",color:t.mut,cursor:"pointer",fontSize:18,padding:"0 4px",lineHeight:1}}>✕</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"20px 28px",lineHeight:1.7,fontSize:13,color:t.text}}>
          {!changelogContent?<div style={{textAlign:"center",padding:40,color:t.mut,display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
            <div style={{display:"flex",gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:t.acc,animation:`pulse 1.4s ${i*.16}s infinite`}}/>)}</div>
            Loading changelog...
          </div>:md(changelogContent)}
        </div>
      </div>
    </div>}

    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=${FONTS[fi].i}&display=swap');
      @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
      @keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}
      @keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
      @keyframes marquee-think{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
      .pill-marquee-wrap{overflow:hidden;max-width:280px;display:inline-block;vertical-align:middle}
      .pill-marquee-inner{display:inline-block;white-space:nowrap;animation:marquee-think 8s linear infinite}
      @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
      @keyframes glow{0%,100%{box-shadow:0 0 8px ${t.acc}88}50%{box-shadow:0 0 16px ${t.acc}CC}}
      @keyframes pGlow{0%,100%{box-shadow:0 0 4px ${t.err}44}50%{box-shadow:0 0 14px ${t.err}88}}
      @keyframes pCouncilGlow{0%,100%{box-shadow:0 0 4px ${t.pink}44}50%{box-shadow:0 0 14px ${t.pink}88}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
      @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
      @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
      @keyframes swing{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
      @keyframes bop{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
      @keyframes memoryPulse{0%{transform:scale(1);opacity:1}25%{transform:scale(1.3);opacity:.7}50%{transform:scale(1);opacity:1}75%{transform:scale(1.2);opacity:.8}100%{transform:scale(1);opacity:1}}
      @keyframes writing{0%{transform:rotate(-8deg) translateY(0)}25%{transform:rotate(4deg) translateY(-1px)}50%{transform:rotate(-6deg) translateY(0)}75%{transform:rotate(5deg) translateY(-1px)}100%{transform:rotate(-8deg) translateY(0)}}
      @keyframes pillGlow {
  0%,100%{box-shadow:0 0 4px var(--pill-glow,rgba(120,200,255,.25));}
  50%{box-shadow:0 0 10px var(--pill-glow,rgba(120,200,255,.55));}
}
      @keyframes glitch{0%,90%,100%{transform:skewX(0)}92%{transform:skewX(-5deg)}94%{transform:skewX(5deg)}96%{transform:skewX(-3deg)}98%{transform:skewX(3deg)}}
      @keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
      @keyframes ripple{0%{transform:scale(0);opacity:1}100%{transform:scale(4);opacity:0}}
      a[download]:hover{background:${t.ok}28 !important;border-color:${t.ok}66 !important;transform:translateY(-1px);box-shadow:0 3px 12px ${t.ok}22;}
      a[download]:active{transform:translateY(0);}
      *{scrollbar-width:thin;scrollbar-color:${t.sfBri} transparent}
      *::-webkit-scrollbar{width:5px}*::-webkit-scrollbar-track{background:transparent}
      *::-webkit-scrollbar-thumb{background:${t.sfBri};border-radius:3px}
      ::selection{background:${t.acc}44}
      textarea::placeholder,input::placeholder{color:${t.mut}55}
      select option{background:${t.bgDeep};color:${t.text}}
      button{transition:all .15s ease;position:relative;overflow:hidden}button:hover{filter:brightness(1.15);transform:translateY(-1px)}button:active{transform:translateY(0)}
    `}</style>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<HyprChat/>);
</script>
</body>
</html>
